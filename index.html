<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- iPhoneでのフルスクリーン表示とズーム禁止の設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="おえかき">
    <title>こどもおえかきアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            background-color: #f0f9ff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            /* iPhoneのノッチ（切り欠き）対策 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .canvas-container {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .color-btn {
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .color-btn:active {
            transform: scale(0.9);
        }
        .selected {
            outline: 4px solid #3b82f6;
            transform: scale(1.1);
        }
        .rainbow-bg {
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
        }
        /* スクロールバーを隠す */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex flex-col h-screen p-2 md:p-4">

    <!-- Header / UI -->
    <div class="flex justify-between items-center mb-2 px-2">
        <div class="flex gap-2 items-center">
            <h1 class="text-xl font-bold text-blue-600">🎨 おえかき</h1>
            <div id="brush-preview" class="w-6 h-6 rounded-full border-2 border-white shadow-sm ml-2"></div>
        </div>
        
        <div class="flex gap-1">
            <button id="undo-btn" class="bg-yellow-400 text-white font-bold py-2 px-3 rounded-full shadow-md text-xs active:bg-yellow-500">
                ↩︎ もどる
            </button>
            <button id="clear-btn" class="bg-red-400 text-white font-bold py-2 px-3 rounded-full shadow-md text-xs active:bg-red-500">
                🗑 けす
            </button>
        </div>
    </div>

    <!-- Main Canvas Area -->
    <div class="flex-grow relative canvas-container bg-white rounded-3xl border-4 border-blue-200 overflow-hidden mx-1">
        <canvas id="drawing-canvas" class="w-full h-full"></canvas>
    </div>

    <!-- Bottom Controls -->
    <div class="mt-3 flex flex-col gap-3 pb-2">
        <!-- Color Selection -->
        <div class="flex overflow-x-auto py-2 gap-3 no-scrollbar px-2" id="color-palette">
            <!-- Colors generated by JS -->
        </div>

        <!-- Tools Area -->
        <div class="flex items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-blue-100 mx-1">
            <div class="flex flex-col items-center gap-1 flex-grow">
                <input type="range" id="brush-size" min="5" max="60" value="15" class="w-full h-6 bg-blue-100 rounded-lg appearance-none cursor-pointer">
            </div>
            
            <button id="eraser-btn" class="bg-gray-100 px-3 py-2 rounded-xl border-2 border-gray-200 text-sm active:bg-gray-200">
                🧽 けしごむ
            </button>
            <button id="rainbow-btn" class="rainbow-bg px-3 py-2 rounded-xl text-white text-sm font-bold shadow-md active:opacity-70">
                🌈 にじ
            </button>
            <button id="save-btn" class="bg-green-500 px-3 py-2 rounded-xl text-white text-sm font-bold shadow-md active:bg-green-600">
                📸
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none font-bold z-50">
        ほぞんしたよ！🌟
    </div>

    <script>
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        const colorPalette = document.getElementById('color-palette');
        const brushSizeInput = document.getElementById('brush-size');
        const brushPreview = document.getElementById('brush-preview');
        const clearBtn = document.getElementById('clear-btn');
        const undoBtn = document.getElementById('undo-btn');
        const saveBtn = document.getElementById('save-btn');
        const eraserBtn = document.getElementById('eraser-btn');
        const rainbowBtn = document.getElementById('rainbow-btn');
        const toast = document.getElementById('toast');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#FF5252';
        let currentSize = 15;
        let isEraser = false;
        let isRainbow = false;
        let hue = 0;
        let history = [];

        const colors = [
            '#FF5252', '#FF4081', '#E040FB', '#7C4DFF', 
            '#448AFF', '#00BCD4', '#4CAF50', '#FFEB3B', 
            '#FF9800', '#795548', '#000000'
        ];

        window.onload = () => {
            resizeCanvas();
            createColorPalette();
            updateBrushPreview();
            saveState();
            
            // iPhoneでスクロールを防止する
            document.addEventListener('touchmove', (e) => {
                if (e.target.id === 'drawing-canvas') {
                    e.preventDefault();
                }
            }, { passive: false });
        };

        function resizeCanvas() {
            const container = canvas.parentElement;
            const tempImg = canvas.toDataURL();
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            const img = new Image();
            img.src = tempImg;
            img.onload = () => ctx.drawImage(img, 0, 0);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function createColorPalette() {
            colors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn flex-shrink-0 w-10 h-10 rounded-full shadow-md border-2 border-white';
                btn.style.backgroundColor = color;
                if (color === currentColor) btn.classList.add('selected');
                btn.onclick = () => {
                    isEraser = false; isRainbow = false;
                    currentColor = color;
                    updateBrushPreview();
                    document.querySelectorAll('.color-btn, #eraser-btn, #rainbow-btn').forEach(el => el.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                colorPalette.appendChild(btn);
            });
        }

        function updateBrushPreview() {
            brushPreview.style.backgroundColor = isEraser ? '#ffffff' : (isRainbow ? `hsl(${hue}, 100%, 50%)` : currentColor);
            if (isEraser) brushPreview.style.border = '1px solid #ddd';
            else brushPreview.style.border = '2px solid white';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(e);
            [lastX, lastY] = [pos.x, pos.y];
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            
            ctx.lineWidth = currentSize;
            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                if (isRainbow) {
                    ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                    hue = (hue + 5) % 360;
                    updateBrushPreview();
                } else {
                    ctx.strokeStyle = currentColor;
                }
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            [lastX, lastY] = [pos.x, pos.y];
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                saveState();
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        brushSizeInput.oninput = (e) => {
            currentSize = e.target.value;
            updateBrushPreview();
        };

        eraserBtn.onclick = () => {
            isEraser = true; isRainbow = false;
            document.querySelectorAll('.color-btn, #rainbow-btn').forEach(el => el.classList.remove('selected'));
            eraserBtn.classList.add('selected');
            updateBrushPreview();
        };

        rainbowBtn.onclick = () => {
            isEraser = false; isRainbow = true;
            document.querySelectorAll('.color-btn, #eraser-btn').forEach(el => el.classList.remove('selected'));
            rainbowBtn.classList.add('selected');
            updateBrushPreview();
        };

        clearBtn.onclick = () => {
            // カスタムダイアログの代わりに簡易確認
            if (confirm('ぜんぶ けす？')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveState();
            }
        };

        undoBtn.onclick = () => {
            if (history.length > 1) {
                history.pop();
                const img = new Image();
                img.src = history[history.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        };

        saveBtn.onclick = () => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            
            // iPhoneでの画像保存は長押しが必要な場合があるため、
            // 新しいタブで画像を開くか、ダウンロードリンクを発火させる
            const dataUrl = tempCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = 'my-picture.png';
            link.click();

            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        };

        function saveState() {
            if (history.length > 15) history.shift();
            history.push(canvas.toDataURL());
        }

        // 画面の回転などに対応
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 200);
        });
    </script>
</body>
</html>
